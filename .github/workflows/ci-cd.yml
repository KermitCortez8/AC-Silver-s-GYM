name: CI/CD Pipeline GYM

on:
  push:
    branches: [ "main", "dockerrealease" ] # Añadí tu rama actual para que puedas probarlo de inmediato
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------
  # PIPELINE DEL BACKEND (Python / FastAPI)
  # -------------------------------------------
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Ubicación basada en tu repositorio

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Ajusta si usas otra versión

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Instala desde tu archivo requirements.txt existente
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Análisis de linter (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Pruebas unitarias
        run: pytest

      - name: Construcción de imagen Docker (Backend)
        # Utiliza el backend/Dockerfile que ya tienes creado
        run: docker build -t ac-silver-gym-backend:latest .

  # -------------------------------------------
  # PIPELINE DEL FRONTEND (Node.js / Vue)
  # -------------------------------------------
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Ubicación basada en tu repositorio

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          # Apunta a tu package-lock.json existente
          cache-dependency-path: ./frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci # Usa 'ci' en lugar de 'install' para instalaciones más limpias y exactas

      - name: Análisis de linter (ESLint)
        run: npm run lint --if-present

      - name: Pruebas unitarias
        run: npm test

      - name: Construcción de la aplicación
        run: npm run build --if-present

      - name: Construcción de imagen Docker (Frontend)
        # Utiliza el frontend/Dockerfile que ya tienes creado
        run: docker build -t ac-silver-gym-frontend:latest .

  # -------------------------------------------
  # PIPELINE DOCKER COMPLETO (Compose)
  # -------------------------------------------
  docker-compose-ci:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v3

      - name: Validar configuración Docker Compose
        run: docker compose config

      - name: Construir programa completo con Docker Compose
        run: docker compose build
