name: CI/CD Pipeline GYM

on:
  push:
    branches: [ "main", "dockerrealease" ] # Añadí tu rama actual para que puedas probarlo de inmediato
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------
  # PIPELINE DEL BACKEND (Python / FastAPI)
  # -------------------------------------------
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Ubicación basada en tu repositorio

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Ajusta si usas otra versión

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Instala desde tu archivo requirements.txt existente
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Análisis de linter (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Pruebas unitarias
        run: pytest

      - name: Construcción de imagen Docker (Backend)
        # Utiliza el backend/Dockerfile que ya tienes creado
        run: docker build -t ac-silver-gym-backend:latest .

  # -------------------------------------------
  # PIPELINE DEL FRONTEND (Node.js / Vue)
  # -------------------------------------------
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Ubicación basada en tu repositorio

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          # Apunta a tu package-lock.json existente
          cache-dependency-path: ./frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci # Usa 'ci' en lugar de 'install' para instalaciones más limpias y exactas

      - name: Análisis de linter (ESLint)
        run: npm run lint --if-present

      - name: Pruebas unitarias
        run: npm test

      - name: Construcción de la aplicación
        run: npm run build --if-present

      - name: Construcción de imagen Docker (Frontend)
        # Utiliza el frontend/Dockerfile que ya tienes creado
        run: docker build -t ac-silver-gym-frontend:latest .

  # -------------------------------------------
  # PIPELINE DOCKER COMPLETO (Compose)
  # -------------------------------------------
  docker-compose-ci:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v3

      - name: Crear envs temporales para Docker Compose
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          {
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY"
            printf 'BACKEND_HOST=0.0.0.0\n'
            printf 'BACKEND_PORT=8000\n'
            printf 'CORS_ORIGINS=http://localhost:5173,http://localhost:5174\n'
          } > backend/.env

          {
            printf "VITE_APP_NAME=AC Silver's GYM\n"
            printf 'VITE_GOOGLE_CLIENT_ID=\n'
            printf 'VITE_AUTH_MODE=backend\n'
            printf 'VITE_ENABLE_DEMO_LOGIN=true\n'
            printf 'VITE_SUPPORT_EMAIL=soporte@acsilversgym.com\n'
            printf 'VITE_SUPABASE_URL=%s\n' "$VITE_SUPABASE_URL"
            printf 'VITE_SUPABASE_LANDING_BUCKET=imageneslandingpage\n'
            printf 'VITE_SUPABASE_LANDING_FOLDER=landingpage\n'
            printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$VITE_SUPABASE_ANON_KEY"
          } > .env

      - name: Validar configuración Docker Compose
        run: docker compose config

      - name: Construir programa completo con Docker Compose
        run: docker compose build
